<!DOCTYPE html>
<html>
<head>
    <title>Waterbase Site</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="glass">
    <!-- Dynamic Title -->
    <h1 id="title"></h1>

    <!-- Password Input -->
    <input type="password" id="pwd" placeholder="Enter password">

    <!-- Unlock Button -->
    <button onclick="unlock()">Unlock</button>

    <!-- Message (wrong password, etc.) -->
    <p id="msg"></p>

    <!-- Download Box (hidden until unlocked) -->
    <div id="downloadBox" style="display:none; margin-top:20px;">
        <button id="downloadBtn">Download File</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const siteName = params.get("name");

// Set page title
document.getElementById("title").innerText = siteName + " — Waterbase";

// Unlock function
function unlock() {
    const pwd = document.getElementById("pwd").value;

    fetch("http://waterbase1fileupload-2.onrender.com/check-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ siteName, password: pwd })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.ok) {
            document.getElementById("msg").innerText = "Wrong password.";
            return;
        }

        // Password correct
        document.getElementById("msg").innerText = "";
        document.getElementById("downloadBox").style.display = "block";

        // Set download button
        document.getElementById("downloadBtn").onclick = () => {
            window.location.href = "http://waterbase1fileupload-2.onrender.com" + data.downloadUrl;
        };
    });
}
</script>

</body>
</html>
